name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d # v2.12.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: odin check rdf -no-entry-point
      - run: odin test rdf
      - run: odin test rdf/ntriples
      - run: odin test rdf/nquads
      - run: odin test tests/property
      - run: odin run examples/minimal
      - run: odin run examples/basic
      - run: odin run examples/nquads

  w3c:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d # v2.12.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: ./scripts/run-w3c-tests.sh
      - run: ./scripts/run-w3c-nquads-tests.sh

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d # v2.12.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: odin check rdf -no-entry-point -vet -warnings-as-errors
      - run: odin check rdf/ntriples -no-entry-point -vet -warnings-as-errors
      - run: odin check rdf/nquads -no-entry-point -vet -warnings-as-errors
      - run: odin check tests/property -no-entry-point -vet -warnings-as-errors
      - run: odin test rdf -sanitize:address
      - run: odin test rdf/ntriples -sanitize:address
      - run: odin test rdf/nquads -sanitize:address
      - run: odin test tests/property -sanitize:address
