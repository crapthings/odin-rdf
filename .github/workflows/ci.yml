name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d # v2.12.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: odin check rdf -no-entry-point
      - run: odin test rdf
      - run: odin test rdf/internal/termlex
      - run: odin test rdf/ntriples
      - run: odin test rdf/nquads
      - run: odin test rdf/turtle
      - run: odin test tests/property
      - run: odin test tests/w3c/support
      - run: odin run examples/minimal
      - run: odin run examples/basic
      - run: odin run examples/nquads

  w3c:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d # v2.12.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: ./scripts/run-w3c-tests.sh
      - run: ./scripts/run-w3c-nquads-tests.sh
      - run: ./scripts/check-w3c-turtle-manifest.sh
      - run: ./scripts/run-w3c-turtle-tests.sh

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d # v2.12.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: odin check rdf -no-entry-point -vet -warnings-as-errors
      - run: odin check rdf/internal/termlex -no-entry-point -vet -warnings-as-errors
      - run: odin check rdf/ntriples -no-entry-point -vet -warnings-as-errors
      - run: odin check rdf/nquads -no-entry-point -vet -warnings-as-errors
      - run: odin check rdf/turtle -no-entry-point -vet -warnings-as-errors
      - run: odin check tests/w3c/support -no-entry-point -vet -warnings-as-errors
      - run: odin check tests/property -no-entry-point -vet -warnings-as-errors
      - run: odin check benchmarks/ntriples -vet -warnings-as-errors
      - run: odin check benchmarks/nquads -vet -warnings-as-errors
      - run: odin check benchmarks/turtle -vet -warnings-as-errors
      - run: odin check benchmarks/mixed -vet -warnings-as-errors
      - run: odin check tests/fuzz -vet -warnings-as-errors
      - run: BENCH_RUNS=1 BENCH_RECORDS=1000 BENCH_ROUNDS=1 ./scripts/run-benchmarks.sh
      - run: odin run tests/fuzz -define:FUZZ_CASES=1000 -define:FUZZ_MAX_BYTES=256
      - run: odin test rdf -sanitize:address
      - run: odin test rdf/internal/termlex -sanitize:address
      - run: odin test rdf/ntriples -sanitize:address
      - run: odin test rdf/nquads -sanitize:address
      - run: odin test rdf/turtle -sanitize:address
      - run: odin test tests/property -sanitize:address
      - run: odin test tests/w3c/support -sanitize:address
